name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Only deploy if CI passed
  # ─────────────────────────────────────────────
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed — proceeding with deployment"

  # ─────────────────────────────────────────────
  # Deploy to Local Kubernetes (docker-desktop)
  # Uses self-hosted runner on your machine
  # ─────────────────────────────────────────────
  deploy-local:
    name: Deploy to Local Kubernetes
    runs-on: self-hosted
    needs: check-ci
    env:
      DOCKER_CONFIG: /Users/dolsombouda/actions-runner-docker
      KUBECONFIG: /Users/dolsombouda/.kube/config
      NAMESPACE: default
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest image
        run: docker pull ${{ env.IMAGE }}:latest

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/mysql.yaml

      - name: Update secret values
        run: |
          kubectl create secret generic api-gateway-secret \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=APP_KEY="${{ secrets.APP_KEY }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image in deployment
        run: |
          sed -i '' "s|image: .*/api-gateway:.*|image: ${{ env.IMAGE }}:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/api-gateway -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Run migrations
        run: |
          kubectl run migrations \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --restart=Never \
            --namespace=${{ env.NAMESPACE }} \
            --env-from=configmap/api-gateway-config \
            --env-from=secret/api-gateway-secret \
            --command -- php artisan migrate --force
          kubectl wait --for=condition=complete job/migrations -n ${{ env.NAMESPACE }} --timeout=60s || true
          kubectl delete pod migrations -n ${{ env.NAMESPACE }} --ignore-not-found

      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          curl -f http://localhost:30080/up || exit 1

  # ─────────────────────────────────────────────
  # Deploy to AWS ECS
  # ─────────────────────────────────────────────
  deploy-aws:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: check-ci

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ secrets.CONTAINER_NAME }}
          image: ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Run migrations on ECS
        run: |
          aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNET }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP }}]}" \
            --overrides '{"containerOverrides":[{"name":"${{ secrets.CONTAINER_NAME }}","command":["php","artisan","migrate","--force"]}]}'
