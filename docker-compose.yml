services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - api-gateway-network
    ports:
      - "8000:80"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=api_gateway
      - DB_USERNAME=root
      - DB_PASSWORD=secret

  db:
    image: mysql:8.0
    container_name: api-gateway-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: api_gateway
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: api_gateway
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - api-gateway-network
    ports:
      - "3307:3306"

networks:
  api-gateway-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  vendor:
    driver: local
