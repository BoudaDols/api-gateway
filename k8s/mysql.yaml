apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-mysql
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway-mysql
  template:
    metadata:
      labels:
        app: api-gateway-mysql
    spec:
      containers:
        - name: api-gateway-mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: api_gateway
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: api-gateway-mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-mysql-service
  namespace: default
spec:
  selector:
    app: api-gateway-mysql
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-gateway-mysql-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
